# Metadata inheritance rules.
#
# NeuroBlueprint uses a cascading inheritance model inspired by the
# BIDS inheritance principle:
# https://bids-specification.readthedocs.io/en/stable/common-principles.html#the-inheritance-principle

principle: |
  A metadata.yaml file applies to all data at its own folder level
  and at every level below it. When a field appears in metadata
  files at more than one level, the value from the most specific
  (deepest) file wins.

hierarchy:
  description: |
    The folder hierarchy from most general (top) to most specific
    (bottom). Later levels override earlier ones.
  levels:
    - level: 1
      name: project root
      pattern: "<project>/metadata.yaml"
    - level: 2
      name: rawdata
      pattern: "<project>/rawdata/metadata.yaml"
    - level: 3
      name: subject
      pattern: "<project>/rawdata/sub-<label>/metadata.yaml"
    - level: 4
      name: session
      pattern: "<project>/rawdata/sub-<label>/ses-<label>/metadata.yaml"
    - level: 5
      name: datatype
      pattern: "<project>/rawdata/sub-<label>/ses-<label>/<datatype>/metadata.yaml"
    - level: 6
      name: sidecar
      pattern: "<project>/rawdata/.../<target_stem>_metadata.yaml"

resolution:
  description: |
    To compute the effective metadata for a given data file:

    1. Collect all metadata.yaml files from the project root down
       to the file's parent directory.
    2. If a sidecar metadata file exists for the specific file,
       include it as the most specific source.
    3. For each section (e.g. "ephys"), merge the key-value pairs
       top-down. A key present at a deeper level replaces the same
       key from a shallower level (last-write-wins per key).
    4. Keys that appear only at higher levels are inherited as-is.

  merge_strategy: per_key
  notes: |
    - Only individual keys are overridden, not entire sections.
      For example, placing "SamplingFrequency: 27000" in a session-
      level ephys section overrides only that key; all other ephys
      keys from higher levels are still inherited.
    - When it is equally valid to place a metadata.yaml file at
      multiple levels, prefer the highest (most general) level.

example:
  description: |
    Project root defines SamplingFrequency as 30000 for all ephys
    data. One session used a different frequency due to an error.

  files:
    - path: "my_project/metadata.yaml"
      content:
        ephys:
          SamplingFrequency: 30000
          ManufacturersModelName: "Neuropixels 2.0"

    - path: "my_project/rawdata/sub-001/ses-001/metadata.yaml"
      content:
        ephys:
          SamplingFrequency: 27000

  effective_values:
    - scope: "sub-001/ses-001/ephys"
      SamplingFrequency: 27000
      ManufacturersModelName: "Neuropixels 2.0"
    - scope: "all other sessions/ephys"
      SamplingFrequency: 30000
      ManufacturersModelName: "Neuropixels 2.0"
