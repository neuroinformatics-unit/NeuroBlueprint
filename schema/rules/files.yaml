# Rules for metadata file naming and placement within a
# NeuroBlueprint project.
#
# These rules describe where metadata.yaml files may appear and
# how sidecar metadata files are named.

metadata_files:

  standard:
    filename: "metadata.yaml"
    description: |
      The standard metadata file. It may be placed at any folder
      level within the project and applies to data at that level
      and all levels below it.
    valid_locations:
      - description: "Project root — applies to all data."
        pattern: "<project>/metadata.yaml"
      - description: "Inside rawdata — applies to all raw data."
        pattern: "<project>/rawdata/metadata.yaml"
      - description: "Subject folder — applies to one subject."
        pattern: "<project>/rawdata/sub-<label>/metadata.yaml"
      - description: "Session folder — applies to one session."
        pattern: "<project>/rawdata/sub-<label>/ses-<label>/metadata.yaml"
      - description: "Datatype folder — applies to one datatype within a session."
        pattern: "<project>/rawdata/sub-<label>/ses-<label>/<datatype>/metadata.yaml"

  sidecar:
    description: |
      A sidecar metadata file associates metadata with a specific
      data file or folder. The filename is formed by appending
      "_metadata.yaml" to the stem of the target file or folder name.

      A sidecar file is only valid if a matching file or folder
      exists in the same directory.
    filename_pattern: "<target_stem>_metadata.yaml"
    examples:
      - target: "run-002_camera-top.mp4"
        sidecar: "run-002_camera-top_metadata.yaml"
      - target: "my_recording.bin"
        sidecar: "my_recording_metadata.yaml"
    constraint: |
      A file named "<X>_metadata.yaml" is only valid when a file
      or folder named "<X>" or "<X>.<ext>" exists in the same
      directory.

sections:
  description: |
    Every metadata.yaml file (standard or sidecar) contains one
    or more top-level YAML sections. Valid section names are:

      project, sub, ses, <datatype>

    where <datatype> is any NeuroBlueprint datatype folder name
    (e.g. ephys, behav, funcimg, anat).

    The section determines which fields are expected. Field
    definitions are in the corresponding objects/ file.
  valid_sections:
    - project
    - sub
    - ses
    - ephys
    - behav
    - funcimg
    - anat
    # Additional NeuroBlueprint datatypes may be added here.
