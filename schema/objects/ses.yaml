# Session-level metadata fields.
#
# These fields appear under the "ses" section of metadata.yaml and
# describe a particular experimental session.
#
# Based on the BIDS Sessions specification:
# https://bids-specification.readthedocs.io/en/stable/modality-agnostic-files/data-summary-files.html

SessionId:
  name: SessionId
  display_name: Session ID
  description: |
    A unique identifier for the session, matching the "ses-<label>"
    folder name (e.g. "ses-001").
  type: string
  requirement_level: recommended

SessionDate:
  name: SessionDate
  display_name: Session Date
  description: |
    Date the session took place, in ISO 8601 format (YYYY-MM-DD).
  type: string
  format: date
  requirement_level: recommended

Age:
  name: Age
  display_name: Age
  description: |
    Age of the subject at the time of this session, expressed in
    the unit given by AgeUnits. Overrides any subject-level Age.
  type: number
  requirement_level: optional

AgeUnits:
  name: AgeUnits
  display_name: Age Units
  description: |
    The unit in which the session-level Age value is expressed.
  type: string
  enum:
    - "year"
    - "week"
    - "day"
    - "hour"
  requirement_level: optional

Weight:
  name: Weight
  display_name: Weight
  description: |
    Weight of the subject at the time of this session.
  type: number
  requirement_level: optional

WeightUnits:
  name: WeightUnits
  display_name: Weight Units
  description: |
    The unit in which the Weight value is expressed
    (e.g. "g", "kg").
  type: string
  requirement_level: optional

Notes:
  name: Notes
  display_name: Notes
  description: |
    Free-text notes about the session (e.g. observations about
    the subject's behaviour, unexpected events, quality notes).
  type: string
  requirement_level: optional

Experimenter:
  name: Experimenter
  display_name: Experimenter
  description: |
    Name of the person who ran the session.
  type: string
  requirement_level: optional
