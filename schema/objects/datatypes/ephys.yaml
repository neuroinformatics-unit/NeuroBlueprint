# Electrophysiology datatype metadata fields.
#
# These fields appear under the "ephys" section of metadata.yaml and
# describe extracellular (or intracellular) electrophysiology acquisitions.
#
# Based on BEP032 — Electrophysiology Metadata:
# https://bids.neuroimaging.io/extensions/beps/bep_032.html

# ---- Institution Information ------------------------------------------------

InstitutionName:
  name: InstitutionName
  display_name: Institution Name
  description: |
    The name of the institution where the data were collected.
  type: string
  requirement_level: recommended

InstitutionAddress:
  name: InstitutionAddress
  display_name: Institution Address
  description: |
    The address of the institution where the data were collected.
  type: string
  requirement_level: optional

InstitutionalDepartmentName:
  name: InstitutionalDepartmentName
  display_name: Institutional Department Name
  description: |
    The name of the department within the institution where the
    data were collected.
  type: string
  requirement_level: optional

# ---- Setup Information ------------------------------------------------------

PowerLineFrequency:
  name: PowerLineFrequency
  display_name: Power Line Frequency
  description: |
    Frequency (in Hz) of the power grid at the recording location
    (50 or 60).
  type: number
  unit: Hz
  enum:
    - 50
    - 60
  requirement_level: recommended

Manufacturer:
  name: Manufacturer
  display_name: Manufacturer
  description: |
    Name of the manufacturer of the recording equipment
    (e.g. "imec", "Intan Technologies").
  type: string
  requirement_level: recommended

ManufacturersModelName:
  name: ManufacturersModelName
  display_name: Manufacturer's Model Name
  description: |
    Model name of the recording equipment
    (e.g. "Neuropixels 2.0", "RHD2164").
  type: string
  requirement_level: recommended

ManufacturersModelVersion:
  name: ManufacturersModelVersion
  display_name: Manufacturer's Model Version
  description: |
    Specific version or variant of the model
    (e.g. "2.0 (4-shank)").
  type: string
  requirement_level: optional

RecordingSetupName:
  name: RecordingSetupName
  display_name: Recording Setup Name
  description: |
    A human-readable name for the full recording rig or setup
    (e.g. "Acute rig 3 — head-fixed Neuropixels").
  type: string
  requirement_level: optional

SamplingFrequency:
  name: SamplingFrequency
  display_name: Sampling Frequency
  description: |
    Sampling frequency (in Hz) of the recording.
  type: number
  unit: Hz
  requirement_level: recommended

DeviceSerialNumber:
  name: DeviceSerialNumber
  display_name: Device Serial Number
  description: |
    Serial number of the recording device.
  type: string
  requirement_level: optional

SoftwareName:
  name: SoftwareName
  display_name: Software Name
  description: |
    Name of the acquisition software
    (e.g. "SpikeGLX", "Open Ephys GUI").
  type: string
  requirement_level: optional

SoftwareVersions:
  name: SoftwareVersions
  display_name: Software Versions
  description: |
    Version(s) of the acquisition software.
  type: string
  requirement_level: optional

RecordingDuration:
  name: RecordingDuration
  display_name: Recording Duration
  description: |
    Total duration of the recording in seconds.
  type: number
  unit: s
  requirement_level: optional

RecordingType:
  name: RecordingType
  display_name: Recording Type
  description: |
    Whether the recording is continuous or epoched.
  type: string
  enum:
    - "continuous"
    - "epoched"
  requirement_level: optional

# ---- Processing Information -------------------------------------------------

SoftwareFilters:
  name: SoftwareFilters
  display_name: Software Filters
  description: |
    Description of any online (software) filters applied during
    acquisition. Use "n/a" if none.
  type: string
  requirement_level: optional

HardwareFilters:
  name: HardwareFilters
  display_name: Hardware Filters
  description: |
    Description of any hardware filters applied during acquisition.
    Use "n/a" if none.
  type: string
  requirement_level: optional

# ---- Pharmaceuticals --------------------------------------------------------

PharmaceuticalName:
  name: PharmaceuticalName
  display_name: Pharmaceutical Name
  description: |
    Name of the pharmaceutical compound administered
    (e.g. "Muscimol", "CNO").
  type: string
  requirement_level: optional

PharmaceuticalDoseAmount:
  name: PharmaceuticalDoseAmount
  display_name: Pharmaceutical Dose Amount
  description: |
    Numerical amount of the dose administered.
  type: number
  requirement_level: optional

PharmaceuticalDoseUnits:
  name: PharmaceuticalDoseUnits
  display_name: Pharmaceutical Dose Units
  description: |
    Unit of the dose amount (e.g. "µg", "mg/kg").
  type: string
  requirement_level: optional

PharmaceuticalDoseRegimen:
  name: PharmaceuticalDoseRegimen
  display_name: Pharmaceutical Dose Regimen
  description: |
    Free-text description of how the pharmaceutical was
    administered (route, concentration, rate, etc.).
  type: string
  requirement_level: optional

PharmaceuticalDoseTime:
  name: PharmaceuticalDoseTime
  display_name: Pharmaceutical Dose Time
  description: |
    Time of administration relative to the start of the recording,
    in seconds. Negative values indicate administration before the
    recording began (e.g. -1800 means 30 minutes before).
  type: number
  unit: s
  requirement_level: optional

# ---- Sample -----------------------------------------------------------------

BodyPart:
  name: BodyPart
  display_name: Body Part
  description: |
    The body part from which the signal is recorded
    (e.g. "BRAIN").
  type: string
  requirement_level: optional

BodyPartDetails:
  name: BodyPartDetails
  display_name: Body Part Details
  description: |
    More specific description of the body part, such as brain
    region(s) targeted
    (e.g. "Primary visual cortex (V1) and posterior parietal cortex (PPC)").
  type: string
  requirement_level: optional

BodyPartDetailsOntology:
  name: BodyPartDetailsOntology
  display_name: Body Part Details Ontology
  description: |
    URL of the ontology term for the body part
    (e.g. "http://purl.obolibrary.org/obo/UBERON_0002436").
  type: string
  format: uri
  requirement_level: optional

SampleEnvironment:
  name: SampleEnvironment
  display_name: Sample Environment
  description: |
    The environment in which the sample was recorded.
  type: string
  enum:
    - "in vivo"
    - "ex vivo"
    - "in vitro"
  requirement_level: optional

SampleEmbedding:
  name: SampleEmbedding
  display_name: Sample Embedding
  description: |
    Description of the embedding medium of the sample.
    Use "n/a" if not applicable (e.g. for in-vivo extracellular
    electrophysiology).
  type: string
  requirement_level: optional

SliceThickness:
  name: SliceThickness
  display_name: Slice Thickness
  description: |
    Thickness of the tissue slice in micrometres.
    Use "n/a" if not applicable.
  type: number
  unit: um
  requirement_level: optional

SampleExtractionProtocol:
  name: SampleExtractionProtocol
  display_name: Sample Extraction Protocol
  description: |
    Description or URL of the protocol used for sample extraction.
    Use "n/a" if not applicable.
  type: string
  requirement_level: optional

# ---- Supplementary ----------------------------------------------------------

SupplementarySignals:
  name: SupplementarySignals
  display_name: Supplementary Signals
  description: |
    Free-text description of any additional signals recorded
    alongside the primary electrophysiology data (e.g. photodiode,
    running wheel, lick sensor).
  type: string
  requirement_level: optional

# ---- Task Information -------------------------------------------------------

TaskName:
  name: TaskName
  display_name: Task Name
  description: |
    Name of the task performed during the recording.
  type: string
  requirement_level: recommended

TaskDescription:
  name: TaskDescription
  display_name: Task Description
  description: |
    Longer free-text description of the task.
  type: string
  requirement_level: optional

Instructions:
  name: Instructions
  display_name: Instructions
  description: |
    Task instructions given to the subject.
    Use "n/a" if not applicable (e.g. for animal subjects).
  type: string
  requirement_level: optional

CogAtlasID:
  name: CogAtlasID
  display_name: Cognitive Atlas ID
  description: |
    URL of the Cognitive Atlas entry for the task
    (https://www.cognitiveatlas.org/).
  type: string
  format: uri
  requirement_level: optional

CogPOID:
  name: CogPOID
  display_name: CogPO ID
  description: |
    URL of the CogPO (Cognitive Paradigm Ontology) entry for the task.
  type: string
  format: uri
  requirement_level: optional
