# Anatomy / microscopy datatype metadata fields.
#
# These fields appear under the "anat" section of metadata.yaml and
# describe anatomical or microscopy image acquisitions.
#
# Based on the BIDS Microscopy specification:
# https://bids-specification.readthedocs.io/en/stable/modality-specific-files/microscopy.html

# ---- Image Acquisition ------------------------------------------------------

PixelSize:
  name: PixelSize
  display_name: Pixel Size
  description: |
    Physical size of a pixel in the three spatial dimensions
    [X, Y, Z], expressed in the unit given by PixelSizeUnits.
  type: array
  items:
    type: number
  minItems: 2
  maxItems: 3
  requirement_level: recommended

PixelSizeUnits:
  name: PixelSizeUnits
  display_name: Pixel Size Units
  description: |
    Unit of the PixelSize values (e.g. "um" for micrometres,
    "mm" for millimetres).
  type: string
  requirement_level: recommended

Immersion:
  name: Immersion
  display_name: Immersion
  description: |
    Immersion medium used for the objective lens
    (e.g. "Air", "Oil", "Water").
  type: string
  requirement_level: optional

NumericalAperture:
  name: NumericalAperture
  display_name: Numerical Aperture
  description: |
    Numerical aperture of the objective lens.
  type: number
  requirement_level: optional

Magnification:
  name: Magnification
  display_name: Magnification
  description: |
    Nominal magnification of the objective lens (e.g. 10, 20, 63).
  type: number
  requirement_level: optional

ImageAcquisitionProtocol:
  name: ImageAcquisitionProtocol
  display_name: Image Acquisition Protocol
  description: |
    URL or free-text description of the image acquisition protocol
    (e.g. a protocols.io DOI).
  type: string
  requirement_level: optional

OtherAcquisitionParameters:
  name: OtherAcquisitionParameters
  display_name: Other Acquisition Parameters
  description: |
    Free-text field for any additional acquisition parameters not
    captured by other fields (e.g. tile overlap, channels, z-step).
  type: string
  requirement_level: optional

# ---- Sample -----------------------------------------------------------------

BodyPart:
  name: BodyPart
  display_name: Body Part
  description: |
    The body part imaged (e.g. "BRAIN").
  type: string
  requirement_level: optional

BodyPartDetails:
  name: BodyPartDetails
  display_name: Body Part Details
  description: |
    More specific description of the body part, such as brain
    region(s) or anatomical location
    (e.g. "Coronal section (~-2.0 mm from bregma) containing V1 and PPC").
  type: string
  requirement_level: optional

BodyPartDetailsOntology:
  name: BodyPartDetailsOntology
  display_name: Body Part Details Ontology
  description: |
    URL of the ontology term for the body part
    (e.g. "http://purl.obolibrary.org/obo/UBERON_0002436").
  type: string
  format: uri
  requirement_level: optional

SampleEnvironment:
  name: SampleEnvironment
  display_name: Sample Environment
  description: |
    The environment in which the sample was imaged.
  type: string
  enum:
    - "in vivo"
    - "ex vivo"
    - "in vitro"
  requirement_level: optional

SampleEmbedding:
  name: SampleEmbedding
  display_name: Sample Embedding
  description: |
    Description of the embedding medium of the sample
    (e.g. "Agarose (4%) for vibratome sectioning").
  type: string
  requirement_level: optional

SampleFixation:
  name: SampleFixation
  display_name: Sample Fixation
  description: |
    Description of the fixation procedure
    (e.g. "4% paraformaldehyde in 0.1 M PBS, transcardial perfusion").
  type: string
  requirement_level: optional

SampleStaining:
  name: SampleStaining
  display_name: Sample Staining
  description: |
    Description of the staining procedure
    (e.g. "DAPI nuclear counterstain; immunostaining for GFP").
  type: string
  requirement_level: optional

SamplePrimaryAntibody:
  name: SamplePrimaryAntibody
  display_name: Sample Primary Antibody
  description: |
    Description of the primary antibody used, ideally including
    the RRID (e.g. "Chicken polyclonal anti-GFP (RRID:AB_300798)").
  type: string
  requirement_level: optional

SampleSecondaryAntibody:
  name: SampleSecondaryAntibody
  display_name: Sample Secondary Antibody
  description: |
    Description of the secondary antibody used, ideally including
    the RRID.
  type: string
  requirement_level: optional

SliceThickness:
  name: SliceThickness
  display_name: Slice Thickness
  description: |
    Thickness of the tissue slice in micrometres.
  type: number
  unit: um
  requirement_level: optional

TissueDeformationScaling:
  name: TissueDeformationScaling
  display_name: Tissue Deformation Scaling
  description: |
    The percentage of original tissue size after deformation
    from tissue processing (100 = no deformation).
  type: number
  unit: "%"
  requirement_level: optional

SampleExtractionProtocol:
  name: SampleExtractionProtocol
  display_name: Sample Extraction Protocol
  description: |
    URL or description of the protocol used for sample extraction
    (e.g. a protocols.io DOI).
  type: string
  requirement_level: optional

SampleExtractionInstitution:
  name: SampleExtractionInstitution
  display_name: Sample Extraction Institution
  description: |
    Name of the institution where sample extraction took place,
    if different from the imaging institution.
  type: string
  requirement_level: optional

# ---- Chunk Transformations --------------------------------------------------

ChunkTransformationMatrix:
  name: ChunkTransformationMatrix
  display_name: Chunk Transformation Matrix
  description: |
    Transformation matrix describing how a given chunk aligns to
    the full sample. Only applicable when chunk-<index> entity is
    used. Use "n/a" if not applicable.
  type: string
  requirement_level: optional

ChunkTransformationMatrixAxis:
  name: ChunkTransformationMatrixAxis
  display_name: Chunk Transformation Matrix Axis
  description: |
    Axes to which the ChunkTransformationMatrix applies.
    Use "n/a" if not applicable.
  type: string
  requirement_level: optional

# ---- Hardware Information ---------------------------------------------------

Manufacturer:
  name: Manufacturer
  display_name: Manufacturer
  description: |
    Name of the manufacturer of the imaging equipment
    (e.g. "Zeiss", "Leica").
  type: string
  requirement_level: recommended

ManufacturersModelName:
  name: ManufacturersModelName
  display_name: Manufacturer's Model Name
  description: |
    Model name of the imaging equipment (e.g. "LSM 980").
  type: string
  requirement_level: recommended

DeviceSerialNumber:
  name: DeviceSerialNumber
  display_name: Device Serial Number
  description: |
    Serial number of the imaging device.
  type: string
  requirement_level: optional

StationName:
  name: StationName
  display_name: Station Name
  description: |
    A human-readable name for the imaging station or rig
    (e.g. "Confocal rig 2").
  type: string
  requirement_level: optional

SoftwareVersions:
  name: SoftwareVersions
  display_name: Software Versions
  description: |
    Version(s) of the acquisition software
    (e.g. "ZEN 3.4 (blue edition)").
  type: string
  requirement_level: optional

# ---- Institution Information ------------------------------------------------

InstitutionName:
  name: InstitutionName
  display_name: Institution Name
  description: |
    The name of the institution where the data were collected.
  type: string
  requirement_level: recommended

InstitutionAddress:
  name: InstitutionAddress
  display_name: Institution Address
  description: |
    The address of the institution where the data were collected.
  type: string
  requirement_level: optional

InstitutionalDepartmentName:
  name: InstitutionalDepartmentName
  display_name: Institutional Department Name
  description: |
    The name of the department within the institution where the
    data were collected.
  type: string
  requirement_level: optional
