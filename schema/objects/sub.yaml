# Subject-level metadata fields.
#
# These fields appear under the "sub" section of metadata.yaml and
# describe experimental subjects (animals, humans, or samples).
#
# Based on the BIDS Participants specification:
# https://bids-specification.readthedocs.io/en/stable/modality-agnostic-files/data-summary-files.html

SubjectId:
  name: SubjectId
  display_name: Subject ID
  description: |
    A unique identifier for the subject, matching the "sub-<label>"
    folder name (e.g. "sub-001").
  type: string
  requirement_level: recommended

Age:
  name: Age
  display_name: Age
  description: |
    Age of the subject at the time of the study, expressed in the
    unit given by AgeUnits. Where multiple sessions span different
    ages, this field can be overridden at the session level.
  type: number
  requirement_level: optional

AgeUnits:
  name: AgeUnits
  display_name: Age Units
  description: |
    The unit in which the Age value is expressed.
  type: string
  enum:
    - "year"
    - "week"
    - "day"
    - "hour"
  requirement_level: optional

Sex:
  name: Sex
  display_name: Sex
  description: |
    Biological sex of the subject.
    Use "M" for male, "F" for female, "O" for other.
  type: string
  enum:
    - "M"
    - "F"
    - "O"
  requirement_level: optional

Handedness:
  name: Handedness
  display_name: Handedness
  description: |
    Handedness of the subject (for human participants).
    Use "R" for right, "L" for left, "A" for ambidextrous,
    or "n/a" if not applicable.
  type: string
  enum:
    - "R"
    - "L"
    - "A"
    - "n/a"
  requirement_level: optional

Species:
  name: Species
  display_name: Species
  description: |
    The binomial species name from the formal nomenclature
    (e.g. "mus musculus", "homo sapiens", "rattus norvegicus").
    Use lowercase as per taxonomic convention.
  type: string
  requirement_level: recommended

Strain:
  name: Strain
  display_name: Strain
  description: |
    The strain designation of the animal subject
    (e.g. "C57BL/6J", "Long-Evans").
  type: string
  requirement_level: optional

StrainRrid:
  name: StrainRrid
  display_name: Strain RRID
  description: |
    Research Resource Identifier (RRID) for the strain, linking
    to registries such as the Jackson Laboratory or IMSR
    (e.g. "RRID:IMSR_JAX:000664").
  type: string
  requirement_level: optional

Genotype:
  name: Genotype
  display_name: Genotype
  description: |
    The genotype of the subject
    (e.g. "Thy1-GCaMP6s/wt", "wild-type").
  type: string
  requirement_level: optional

DateOfBirth:
  name: DateOfBirth
  display_name: Date of Birth
  description: |
    Date of birth of the subject in ISO 8601 format (YYYY-MM-DD).
  type: string
  format: date
  requirement_level: optional
